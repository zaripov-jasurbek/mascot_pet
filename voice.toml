# Конфиг голосового управления маскотом (русский язык).
# Команда исполняется только если фраза содержит wake word.
# Пути приложений НЕ хранятся здесь — индексируются автоматически из Start Menu + PATH.
# Здесь только: alias (произношение → имя в индексе) и site (сайт → URL).

# Путь к Vosk-модели. small-ru сейчас; большая — vosk-model-ru-0.42 (точнее, тяжелее).
model = "models/vosk-model-small-ru-0.22"
# Большая модель брендов НЕ улучшает (русский словарь) и грузится ~2 мин — не используем.
# model = "models/vosk-model-ru-0.42"

# Слово-активатор. Реальное словарное слово — распознаётся стабильно.
wake  = "помощник"

# Глаголы-триггеры.
verbs = ["открой", "открывай", "открывайте", "открыть", "запусти", "запускай", "запустить", "включи", "включай"]

# Основа слова-браузера: если звучит во фразе («браузер»/«браузере»/«браузеры»),
# цель трактуется как сайт и открывается в браузере по умолчанию.
browser_word = "браузер"

# Имена приложений сопоставляются АВТОМАТИЧЕСКИ: транслит + звуковой скелет
# (без гласных/окончаний). «стим»≈steam, «телеграм»≈telegram — алиасы не нужны.
#
# [alias] — необязательные личные поправки. Нужны только в двух случаях:
#   1) имя в «Пуске» сильно отличается от произношения (Edge → "Microsoft Edge");
#   2) маленькая модель устойчиво путает согласную (тогда добавь свой вариант).
[alias]
"эдж" = "microsoft edge"

# Сайты вне таблицы и истории открываются поиском Google. {q} — место для запроса.
search_url = "https://www.google.com/search?q={q}"

# [site] — НЕОБЯЗАТЕЛЬНО. Точные ярлыки для частых сайтов (без поиска, мгновенно).
[site]
"ютуб"   = "https://youtube.com"
"гитхаб" = "https://github.com"
"чат"    = "https://chatgpt.com"
